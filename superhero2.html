<!DOCTYPE html>
<html>
<head>
  <title>My Superhero Power Cards</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f4ff;
      text-align: center;
      padding: 30px;
    }

    h1 {
      color: #ff4d4d;
    }

    p {
      color: #444444;
    }

    button {
      background-color: #ff4d4d;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .card-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    .hero-card {
      background-color: white;
      border: 3px solid #ff4d4d;
      border-radius: 12px;
      width: 220px;
      padding: 18px;
    }

    .hero-name {
      font-size: 22px;
      font-weight: bold;
      color: #222222;
    }

    .hero-power {
      color: #0057b8;
      font-weight: bold;
    }

    .hero-mission {
      color: #666666;
      font-size: 14px;
    }
    .show heroes-button {
      margin-top: 20px;
        width: 150px;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 10px;
}
    
  </style>
</head>

<body>

  <h1>My Superhero Power Cards</h1>

  <p>
    Click the button to create superhero objects using JavaScript classes.
  </p>

  <button onclick="showHeroes()">Show Superheroes</button>

  <div class="card-container" id="heroCards"></div>

  <script>
    // What is a Class?
    // A class is a blueprint used to create objects.

    class Superhero {

      // Constructor
      constructor(name, power, mission) {

        // The this keyword stores values inside the object
        this.name = name;
        this.power = power;
        this.mission = mission;
      }

      // Class Method
      describeHero() {
        return "<div class='hero-card'>" +
               "<p class='hero-name'>" + this.name + "</p>" +
               "<p class='hero-power'>Power: " + this.power + "</p>" +
               "<p class='hero-mission'>Mission: " + this.mission + "</p>" +
               "</div>";
      }
    }

   

     

      
    function showHeroes() {

  let hero1 = new Superhero(
    "Spider-Man",
    "Wall Climbing",
    "Protect New York City",
    "https://upload.wikimedia.org/wikipedia/en/0/0c/Spiderman50.jpg"
  );

  let hero2 = new Superhero(
    "Batman",
    "Master Detective",
    "Protect Gotham City",
    "https://upload.wikimedia.org/wikipedia/en/1/17/Batman-BenAffleck.jpg"
  );

  let hero3 = new Superhero(
    "Iron Man",
    "Powered Armor Suit",
    "Save the World",
    "https://upload.wikimedia.org/wikipedia/en/e/e0/Iron_Man_bleeding_edge.jpg"
  );

  let hero4 = new Superhero(
    "Wonder Woman",
    "Super Strength",
    "Fight for Justice",
    "https://upload.wikimedia.org/wikipedia/en/9/93/Wonder_Woman.jpg"
  );

  document.getElementById("heroCards").innerHTML =
    hero1.describeHero() +
    hero2.describeHero() +
    hero3.describeHero() +
    hero4.describeHero();

}

  </script>
